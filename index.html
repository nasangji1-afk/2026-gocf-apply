        const calculateCosts = (data) => {
        let supply = 0;

        if (data.exhibitionBooth?.active) {
            const price = data.exhibitionBooth.isPastParticipant ? PRICES.exhibitionDiscount : PRICES.exhibition;
            supply += price * Math.max(0, parseInt(data.exhibitionBooth.qty) || 0);
        }
        if (data.salesBooth?.active) {
            supply += PRICES.sales * Math.max(0, parseInt(data.salesBooth.qty) || 0);
        }
        if (data.warehouseTent?.active) {
            supply += PRICES.warehouse * Math.max(0, parseInt(data.warehouseTent.qty) || 0);
        }
        if (data.envFee) {
            supply += PRICES.envFee;
        }
        
        supply += PRICES.table * Math.max(0, parseInt(data.table?.qty) || 0);
        supply += PRICES.chair * Math.max(0, parseInt(data.chair?.qty) || 0);
        
        if (data.extraPower === '1-3kw') supply += PRICES.power1to3;
        if (data.extraPower === '3-5kw') supply += PRICES.power3to5;
        if (data.extraPower === '5kw+') supply += PRICES.power5plus;

        const vat = supply * 0.1;
        const total = supply + vat;
        
        return { supply, vat, total };

            await deleteDoc(appRef);
            alert('삭제되었습니다.');
            setSelectedApp(null);
            } catch (e) {
            alert('오류가 발생했습니다.');
            }
        };

        if (!isAuthenticated) {
            return (
            <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
                <div className="flex justify-center mb-6">
                    <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center">
                    <Lock className="w-8 h-8 text-orange-500" />
                    </div>
                </div>
                <h2 className="text-xl font-bold text-center text-gray-800 mb-6">관리자 로그인</h2>
                <input 
                    type="password"
                    placeholder="비밀번호 입력"
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 outline-none focus:border-orange-500 transition-colors"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                />
                <button 
                    onClick={handleLogin}
                    className="w-full bg-slate-900 text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition-colors mb-3"
                >
                    접속하기
                </button>
                <button 
                    onClick={onBack}
                    className="w-full text-gray-500 text-sm py-2 hover:text-gray-700"
                >
                    ← 메인으로 돌아가기
                </button>
                </div>
            </div>
            );
        }

        const filteredApps = applications.filter(app => 
            app.brandName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
            app.exhibitionManager?.name?.toLowerCase().includes(searchTerm.toLowerCase())
        );

        return (
            <div className="min-h-screen bg-gray-50 text-gray-800">
            <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-4">
                    <button onClick={onBack} className="p-2 hover:bg-slate-800 rounded-full transition-colors">
                    <ArrowLeft className="w-5 h-5" />
                    </button>
                    <h1 className="text-xl font-bold flex items-center">
                    <Database className="w-5 h-5 mr-2 text-orange-500" />
                    2026 GOCF 관리자
                    </h1>
                </div>
                <div className="flex items-center gap-3 w-full md:w-auto">
                    <div className="relative flex-1 md:w-64">
                    <Search className="absolute left-3 top-2.5 w-4 h-4 text-gray-400" />
                    <input 
                        type="text" 
                        placeholder="브랜드명 또는 담당자 검색" 
                        className="w-full pl-9 pr-4 py-2 rounded-lg bg-slate-800 border-none text-sm text-white placeholder-slate-400 focus:ring-2 focus:ring-orange-500 outline-none"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    </div>
                    <button 
                    onClick={handleDownloadCSV}
                    className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center transition-colors whitespace-nowrap"
                    >
                    <Download className="w-4 h-4 mr-1.5" /> 엑셀 저장
                    </button>
                </div>
                </div>
            </header>

            <main className="max-w-7xl mx-auto p-4 md:p-8">
                {/* Stats Dashboard */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <h3 className="text-xs font-bold text-gray-500 mb-1 uppercase">총 신청 건수</h3>
                    <div className="text-2xl font-extrabold text-slate-800">{stats.total} <span className="text-sm font-normal text-gray-400">건</span></div>
                </div>
                <div className="bg-emerald-50 p-5 rounded-xl shadow-sm border border-emerald-100">
                    <h3 className="text-xs font-bold text-emerald-600 mb-1 uppercase">전시부스 신청총계</h3>
                    <div className="text-2xl font-extrabold text-emerald-700">{stats.exhibitionCount} <span className="text-sm font-normal text-emerald-500">개</span></div>
                </div>
                <div className="bg-amber-50 p-5 rounded-xl shadow-sm border border-amber-100">
                    <h3 className="text-xs font-bold text-amber-600 mb-1 uppercase">판매부스 신청총계</h3>
                    <div className="text-2xl font-extrabold text-amber-700">{stats.salesCount} <span className="text-sm font-normal text-amber-500">개</span></div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500">
                    <h3 className="text-xs font-bold text-gray-500 mb-1 flex items-center">확정 매출 (입금완료)</h3>
                    <div className="text-xl font-extrabold text-green-600 truncate">{formatCurrency(stats.confirmedAmount)} <span className="text-xs font-normal text-gray-400">원</span></div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-orange-500">
                    <h3 className="text-xs font-bold text-gray-500 mb-1 flex items-center">수주 예상 (미확정)</h3>
                    <div className="text-xl font-extrabold text-orange-600 truncate">{formatCurrency(stats.expectedAmount)} <span className="text-xs font-normal text-gray-400">원</span></div>
                </div>
                </div>

                {/* List */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <span className="font-bold text-gray-700">신청 목록</span>
                    <span className="text-xs text-gray-500">항목을 클릭하여 상세 정보를 확인/수정하세요.</span>
                </div>
                
                <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                    <thead className="bg-gray-100 text-gray-600 uppercase text-xs">
                        <tr>
                        <th className="px-6 py-3 font-bold">상태</th>
                        <th className="px-6 py-3 font-bold">신청일시</th>
                        <th className="px-6 py-3 font-bold">브랜드 정보</th>
                        <th className="px-6 py-3 font-bold">신청 부스</th>
                        <th className="px-6 py-3 font-bold text-right">결제금액</th>
                        <th className="px-6 py-3 font-bold">담당자</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                        {loading ? (
                        <tr><td colSpan="6" className="p-8 text-center text-gray-500">데이터를 불러오는 중입니다...</td></tr>
                        ) : filteredApps.length === 0 ? (
                        <tr><td colSpan="6" className="p-8 text-center text-gray-500">검색 결과가 없습니다.</td></tr>
                        ) : (
                        filteredApps.map((app) => (
                            <tr 
                            key={app.id} 
                            className="hover:bg-orange-50/50 transition-colors cursor-pointer group"
                            onClick={() => setSelectedApp(app)}
                            >
                            <td className="px-6 py-4">
                                {app.status === 'confirmed' ? (
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                    참가확정
                                </span>
                                ) : (
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 group-hover:bg-white">
                                    신청완료
                                </span>
                                )}
                            </td>
                            <td className="px-6 py-4 text-gray-500 whitespace-nowrap text-xs">
                                {app.createdAt ? new Date(app.createdAt.seconds * 1000).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'}
                            </td>
                            <td className="px-6 py-4">
                                <div className="font-bold text-gray-900">{app.brandName}</div>
                                <div className="text-xs text-gray-500">{app.bizName}</div>
                            </td>
                            <td className="px-6 py-4">
                                {app.exhibitionBooth?.active && (
                                <div className="text-emerald-700 text-xs font-bold mb-1">
                                    전시 {app.exhibitionBooth.qty}개
                                </div>
                                )}
                                {app.salesBooth?.active && (
                                <div className="text-amber-700 text-xs font-bold">
                                    판매 {app.salesBooth.qty}개
                                </div>
                                )}
                            </td>
                            <td className="px-6 py-4 text-right font-bold text-gray-800">
                                {formatCurrency(app.costs?.total || 0)}
                            </td>
                            <td className="px-6 py-4">
                                <div className="text-gray-900">{app.exhibitionManager?.name}</div>
                                <div className="text-xs text-gray-500">{app.exhibitionManager?.phone}</div>
                            </td>
                            </tr>
                        ))
                        )}
                    </tbody>
                    </table>
                </div>
                </div>

                {/* Detail/Edit Modal */}
                {selectedApp && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto relative">
                    <div className="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                        <h3 className="text-lg font-bold text-slate-900 flex items-center">
                        {editMode ? '신청 정보 수정' : '신청 상세 정보'}
                        {selectedApp.status === 'confirmed' && <span className="ml-2 text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full">참가확정</span>}
                        </h3>
                        <button onClick={() => { setSelectedApp(null); setEditMode(false); }} className="p-1 hover:bg-gray-100 rounded-full">
                        <X className="w-5 h-5 text-gray-500" />
                        </button>
                    </div>
                    
                    <div className="p-6 space-y-6">
                        {editMode ? (
                        <EditForm app={selectedApp} onSave={handleUpdateApp} onCancel={() => setEditMode(false)} />
                        ) : (
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs text-gray-500">브랜드명</label>
                                <div className="font-bold text-lg">{selectedApp.brandName}</div>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500">사업자명</label>
                                <div className="font-medium">{selectedApp.bizName}</div>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500">입금자명</label>
                                <div className="font-medium">{selectedApp.depositorName}</div>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500">사업자번호</label>
                                <div className="font-medium">{selectedApp.bizNumber}</div>
                            </div>
                            </div>
                            
                            {/* File Attachment Info */}
                            <div className="bg-gray-50 p-3 rounded border border-gray-200 flex items-center">
                            <FileText className="w-5 h-5 text-gray-500 mr-2" />
                            <div>
                                <div className="text-xs text-gray-500 font-bold">사업자등록증 파일명</div>
                                <div className="text-sm text-blue-600 truncate max-w-xs">
                                {selectedApp.bizFile ? selectedApp.bizFile : '첨부된 파일 없음'}
                                </div>
                            </div>
                            </div>

                            <div className="border-t pt-4">
                            <h4 className="font-bold text-sm mb-3">담당자 정보</h4>
                            <div className="grid grid-cols-2 gap-4 text-sm">
                                <div className="bg-gray-50 p-3 rounded">
                                <div className="font-bold text-gray-600 mb-1">전시 담당자</div>
                                <div>{selectedApp.exhibitionManager?.name} {selectedApp.exhibitionManager?.title}</div>
                                <div className="text-gray-500">{selectedApp.exhibitionManager?.phone}</div>
                                <div className="text-gray-500">{selectedApp.exhibitionManager?.email}</div>
                                </div>
                                <div className="bg-gray-50 p-3 rounded">
                                <div className="font-bold text-gray-600 mb-1">세금계산서 담당자</div>
                                <div>{selectedApp.taxManager?.name} {selectedApp.taxManager?.title}</div>
                                <div className="text-gray-500">{selectedApp.taxManager?.phone}</div>
                                <div className="text-gray-500">{selectedApp.taxManager?.email}</div>
                                </div>
                            </div>
                            </div>

                            <div className="border-t pt-4">
                            <h4 className="font-bold text-sm mb-3">신청 내역 & 금액</h4>
                            <div className="bg-slate-50 p-4 rounded-lg space-y-2 text-sm">
                                {selectedApp.exhibitionBooth?.active && (
                                <div className="flex justify-between">
                                    <span className="text-emerald-700 font-medium">전시 부스 ({selectedApp.exhibitionBooth.qty}개)</span>
                                    <span>{selectedApp.exhibitionBooth.isPastParticipant ? '재참가 할인 적용' : ''}</span>
                                </div>
                                )}
                                {selectedApp.salesBooth?.active && (
                                <div className="flex justify-between">
                                    <span className="text-amber-700 font-medium">판매 부스 ({selectedApp.salesBooth.qty}개)</span>
                                </div>
                                )}
                                {selectedApp.warehouseTent?.active && (
                                <div className="flex justify-between">
                                    <span>재고 창고 ({selectedApp.warehouseTent.qty}개)</span>
                                </div>
                                )}
                                {selectedApp.table?.qty > 0 && (
                                <div className="flex justify-between">
                                    <span>테이블 ({selectedApp.table.qty}개)</span>
                                </div>
                                )}
                                {selectedApp.chair?.qty > 0 && (
                                <div className="flex justify-between">
                                    <span>의자 ({selectedApp.chair.qty}개)</span>
                                </div>
                                )}
                                <div className="flex justify-between">
                                <span>환경부담금 포함</span>
                                </div>
                                <div className="border-t border-slate-200 pt-2 mt-2 flex justify-between font-bold text-lg">
                                <span>총 결제 금액</span>
                                <span className="text-orange-600">{formatCurrency(selectedApp.costs?.total || 0)} 원</span>
                                </div>
                            </div>
                            </div>
                        </div>
                        )}
                    </div>

                    <div className="sticky bottom-0 bg-gray-50 px-6 py-4 border-t flex justify-between items-center">
                        {!editMode && (
                        <>
                            <button 
                            onClick={handleDeleteApp}
                            className="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-medium text-sm flex items-center transition-colors"
                            >
                            <Trash2 className="w-4 h-4 mr-1.5" /> 삭제하기
                            </button>
                            <div className="flex gap-2">
                            <button 
                                onClick={() => setEditMode(true)}
                                className="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-50 flex items-center transition-colors"
                            >
                                <Edit className="w-4 h-4 mr-1.5" /> 정보 수정
                            </button>
                            {selectedApp.status !== 'confirmed' && (
                                <button 
                                onClick={handleConfirmApp}
                                className={`${confirmStep ? 'bg-red-600 hover:bg-red-700' : 'bg-slate-900 hover:bg-slate-800'} text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center transition-colors shadow-lg`}
                                >
                                <CheckCircle className="w-4 h-4 mr-1.5" /> 
                                {confirmStep ? '정말 확정하시겠습니까?' : '입금 확인 / 참가 확정'}
                                </button>
                            )}
                            </div>
                        </>
                        )}
                    </div>
                    </div>
                </div>
                )}
            </main>
            </div>
        );
        };

        // --- Edit Form Helper Component ---
        const EditForm = ({ app, onSave, onCancel }) => {
        const [data, setData] = useState(app);

        const handleChange = (section, field, value) => {
            let newData = { ...data };
            
            if (section === 'root') {
            newData = { ...newData, [field]: value };
            } else {
            newData = { ...newData, [section]: { ...newData[section], [field]: value } };
            }

            // Auto-recalculate costs when booth/options change
            const newCosts = calculateCosts(newData);
            newData.costs = newCosts;
            
            setData(newData);
        };

        return (
            <div className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
                <div>
                <label className="block text-xs font-bold text-gray-500 mb-1">브랜드명</label>
                <input type="text" className="w-full border rounded p-2 text-sm" value={data.brandName} onChange={(e) => handleChange('root', 'brandName', e.target.value)} />
                </div>
                <div>
                <label className="block text-xs font-bold text-gray-500 mb-1">사업자명</label>
                <input type="text" className="w-full border rounded p-2 text-sm" value={data.bizName} onChange={(e) => handleChange('root', 'bizName', e.target.value)} />
                </div>
                <div>
                <label className="block text-xs font-bold text-gray-500 mb-1">입금자명</label>
                <input type="text" className="w-full border rounded p-2 text-sm" value={data.depositorName} onChange={(e) => handleChange('root', 'depositorName', e.target.value)} />
                </div>
                <div>
                <label className="block text-xs font-bold text-gray-500 mb-1">사업자번호</label>
                <input type="text" className="w-full border rounded p-2 text-sm" value={data.bizNumber} onChange={(e) => handleChange('root', 'bizNumber', e.target.value)} />
                </div>
            </div>
            
            <div className="border-t pt-4">
                <h4 className="font-bold text-sm mb-2">담당자 정보 수정</h4>
                <div className="grid grid-cols-2 gap-4">
                <div>
                    <label className="block text-xs text-gray-500 mb-1">전시 담당자명</label>
                    <input type="text" className="w-full border rounded p-2 text-sm" value={data.exhibitionManager?.name} onChange={(e) => handleChange('exhibitionManager', 'name', e.target.value)} />
                </div>
                <div>
                    <label className="block text-xs text-gray-500 mb-1">연락처</label>
                    <input type="text" className="w-full border rounded p-2 text-sm" value={data.exhibitionManager?.phone} onChange={(e) => handleChange('exhibitionManager', 'phone', e.target.value)} />
                </div>
                </div>
            </div>

            <div className="border-t pt-4">
                <h4 className="font-bold text-sm mb-2">부스 및 옵션 수정 (금액 자동 계산)</h4>
                <div className="space-y-3 bg-gray-50 p-3 rounded">
                <div className="flex items-center justify-between">
                    <label className="text-sm font-medium">전시 부스 수량</label>
                    <div className="flex items-center gap-2">
                        <input type="checkbox" checked={data.exhibitionBooth?.active} onChange={(e) => handleChange('exhibitionBooth', 'active', e.target.checked)} className="mr-1"/>
                        <input type="number" className="w-16 border rounded p-1 text-center" value={data.exhibitionBooth?.qty} onChange={(e) => handleChange('exhibitionBooth', 'qty', e.target.value)} disabled={!data.exhibitionBooth?.active} />
                    </div>
                </div>
                <div className="flex items-center justify-between">
                    <label className="text-sm font-medium">판매 부스 수량</label>
                    <div className="flex items-center gap-2">
                        <input type="checkbox" checked={data.salesBooth?.active} onChange={(e) => handleChange('salesBooth', 'active', e.target.checked)} className="mr-1"/>
                        <input type="number" className="w-16 border rounded p-1 text-center" value={data.salesBooth?.qty} onChange={(e) => handleChange('salesBooth', 'qty', e.target.value)} disabled={!data.salesBooth?.active}/>
                    </div>
                </div>
                <div className="flex items-center justify-between">
                    <label className="text-sm font-medium">재고 창고 수량</label>
                    <div className="flex items-center gap-2">
                        <input type="checkbox" checked={data.warehouseTent?.active} onChange={(e) => handleChange('warehouseTent', 'active', e.target.checked)} className="mr-1"/>
                        <input type="number" className="w-16 border rounded p-1 text-center" value={data.warehouseTent?.qty} onChange={(e) => handleChange('warehouseTent', 'qty', e.target.value)} disabled={!data.warehouseTent?.active} />
                    </div>
                </div>
                    <div className="flex items-center justify-between pt-2 border-t border-gray-200">
                    <label className="text-sm font-medium text-gray-500">테이블 / 의자</label>
                    <div className="flex gap-2">
                        <input type="number" className="w-16 border rounded p-1 text-center placeholder-gray-300" placeholder="테이블" value={data.table?.qty} onChange={(e) => handleChange('table', 'qty', e.target.value)} />
                        <input type="number" className="w-16 border rounded p-1 text-center placeholder-gray-300" placeholder="의자" value={data.chair?.qty} onChange={(e) => handleChange('chair', 'qty', e.target.value)} />
                    </div>
                </div>
                </div>
                <div className="mt-3 text-right font-bold text-orange-600">
                예상 변경 금액: {formatCurrency(data.costs?.total || 0)} 원
                </div>
            </div>
            
            <div className="flex justify-end gap-2 pt-4 border-t">
                <button onClick={onCancel} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded">취소</button>
                <button onClick={() => onSave(data)} className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center">
                <Save className="w-4 h-4 mr-1" /> 저장하기
                </button>
            </div>
            </div>
        );
        };

        // --- Main App Component ---

        const App = () => {
        const [user, setUser] = useState(null);
        const [currentView, setCurrentView] = useState('form'); // 'form' or 'admin'
        
        // Auth Initialization
        useEffect(() => {
            const initAuth = async () => {
                if (typeof __firebase_config === 'undefined' && (!firebaseConfig || firebaseConfig.apiKey.includes("본인의_API_KEY"))) {
                    // console.error("Firebase config is missing for deployment");
                    return; // Prevent auth call if config is placeholder
                }
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("Auth Error:", error);
                }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
        }, []);

        // View Routing
        if (currentView === 'admin') {
            return <AdminDashboard onBack={() => setCurrentView('form')} />;
        }

        return <ApplicationForm onAdminClick={() => setCurrentView('admin')} user={user} />;
        };

        // --- Application Form Component ---
        const ApplicationForm = ({ onAdminClick, user }) => {
        const [step, setStep] = useState(1); // 1: Terms, 2: Form, 3: Complete
        const [agreed, setAgreed] = useState(false);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [isCopied, setIsCopied] = useState(false);
        
        // Email sending state
        const [isEmailSending, setIsEmailSending] = useState(false);
        
        // Manager Sync State
        const [isSameManager, setIsSameManager] = useState(false);

        // Form State
        const [formData, setFormData] = useState({
            brandName: '',
            bizName: '',
            exhibitionManager: { name: '', title: '', email: '', phone: '' },
            taxManager: { name: '', title: '', email: '', phone: '' },
            bizNumber: '',
            bizFile: null, 
            exhibitionItems: '',
            salesItems: '',
            
            // Booths
            exhibitionBooth: { active: false, qty: 0, isPastParticipant: false },
            salesBooth: { active: false, qty: 0 },
            
            // Options
            warehouseTent: { active: false, qty: 0 },
            envFee: true,
            table: { qty: 0 },
            chair: { qty: 0 },
            extraPower: 'none',
            
            // Payment
            depositorName: '',
            settlementAccount: { bank: '', account: '', holder: '' },
            taxInvoiceType: 'pre',
        });

        const [costs, setCosts] = useState({ supply: 0, vat: 0, total: 0 });
        const termsRef = useRef(null);

        // Sync Managers when checkbox is checked
        useEffect(() => {
            if (isSameManager) {
            setFormData(prev => ({
                ...prev,
                taxManager: { ...prev.exhibitionManager }
            }));
            }
        }, [isSameManager, formData.exhibitionManager]);

        // Cost Calculation
        useEffect(() => {
            calculateTotal();
        }, [formData]);

        const calculateTotal = () => {
            let supply = 0;

            if (formData.exhibitionBooth.active) {
            const price = formData.exhibitionBooth.isPastParticipant ? PRICES.exhibitionDiscount : PRICES.exhibition;
            supply += price * Math.max(0, formData.exhibitionBooth.qty);
            }
            if (formData.salesBooth.active) {
            supply += PRICES.sales * Math.max(0, formData.salesBooth.qty);
            }
            if (formData.warehouseTent.active) {
            supply += PRICES.warehouse * Math.max(0, formData.warehouseTent.qty);
            }
            if (formData.envFee) {
            supply += PRICES.envFee;
            }
            supply += PRICES.table * Math.max(0, formData.table.qty);
            supply += PRICES.chair * Math.max(0, formData.chair.qty);
            if (formData.extraPower === '1-3kw') supply += PRICES.power1to3;
            if (formData.extraPower === '3-5kw') supply += PRICES.power3to5;
            if (formData.extraPower === '5kw+') supply += PRICES.power5plus;

            const vat = supply * 0.1;
            setCosts({ supply, vat, total: supply + vat });
        };

        // --- Handlers ---

        const handleInputChange = (section, field, value) => {
            if (section === 'root') {
            if (field === 'envFee' && value === false) return; // Enforce envFee
            setFormData(prev => ({ ...prev, [field]: value }));
            } else if (['exhibitionManager', 'taxManager', 'settlementAccount'].includes(section)) {
            setFormData(prev => ({
                ...prev,
                [section]: { ...prev[section], [field]: value }
            }));
            } else if (['exhibitionBooth', 'salesBooth', 'warehouseTent'].includes(section)) {
            setFormData(prev => ({
                ...prev,
                [section]: { ...prev[section], [field]: value }
            }));
            } else if (['table', 'chair'].includes(section)) {
            setFormData(prev => ({
                ...prev,
                [section]: { ...prev[section], qty: parseInt(value) || 0 }
            }));
            }
        };

        const handleCopyAccount = () => {
            const account = "585-039456-04-018";
            if (navigator.clipboard) {
            navigator.clipboard.writeText(account).then(() => {
                setIsCopied(true);
                setTimeout(() => setIsCopied(false), 2000);
            });
            } else {
            const textArea = document.createElement("textarea");
            textArea.value = account;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            setIsCopied(true);
            setTimeout(() => setIsCopied(false), 2000);
            }
        };

        const handleSubmit = async () => {
            if (!formData.brandName || !formData.bizName || !formData.depositorName) {
            alert("필수 정보(브랜드명, 사업자명, 입금자명)를 모두 입력해주세요.");
            return;
            }

            if (!user) {
            alert("서버 연결(로그인) 중입니다. 잠시 후 다시 시도해주세요.");
            return;
            }

            setIsSubmitting(true);

            try {
            const submissionData = {
                ...formData,
                bizFile: formData.bizFile ? formData.bizFile.name : null,
                costs,
                userId: user.uid,
                createdAt: serverTimestamp(),
                status: 'applied'
            };

            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'gocf_applications'), submissionData);
            
            console.log("Document written with ID: ", docRef.id);
            setStep(3);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
            console.error("Error adding document: ", e);
            alert("신청 중 오류가 발생했습니다. 다시 시도해주세요.\n" + e.message);
            } finally {
            setIsSubmitting(false);
            }
        };

        const handleSendMail = () => {
            const email = formData.exhibitionManager.email || formData.taxManager.email;
            if (!email) {
            alert("입력된 담당자 이메일 정보가 없습니다. 관리자에게 문의해주세요.");
            return;
            }
            
            setIsEmailSending(true);
            setTimeout(() => {
            setIsEmailSending(false);
            alert(`[전송 완료] ${email} 주소로 신청 내역서를 발송했습니다.\n(메일함의 스팸함도 확인해 주세요)`);
            }, 1500);
        };

        const getBreakdownItems = () => {
            const items = [];
            if (formData.exhibitionBooth.active && formData.exhibitionBooth.qty > 0) {
            const isDiscount = formData.exhibitionBooth.isPastParticipant;
            const price = isDiscount ? PRICES.exhibitionDiscount : PRICES.exhibition;
            const name = isDiscount ? '전시 부스 (할인 -400,000원 적용)' : '전시 부스 (잔디 구역)';
            const type = 'exhibition';
            items.push({ name, qty: formData.exhibitionBooth.qty, price, type });
            }
            if (formData.salesBooth.active && formData.salesBooth.qty > 0) {
            items.push({ name: '판매 부스 (몽골텐트)', qty: formData.salesBooth.qty, price: PRICES.sales, type: 'sales' });
            }
            if (formData.warehouseTent.active && formData.warehouseTent.qty > 0) {
            items.push({ name: '재고 창고 (몽골텐트)', qty: formData.warehouseTent.qty, price: PRICES.warehouse, type: 'option' });
            }
            if (formData.envFee) {
            items.push({ name: '환경부담금 (필수)', qty: 1, price: PRICES.envFee, type: 'fee' });
            }
            if (formData.table.qty > 0) items.push({ name: '테이블 추가', qty: formData.table.qty, price: PRICES.table, type: 'furniture' });
            if (formData.chair.qty > 0) items.push({ name: '의자 추가', qty: formData.chair.qty, price: PRICES.chair, type: 'furniture' });
            if (formData.extraPower !== 'none') {
            let price = 0;
            let label = '';
            if (formData.extraPower === '1-3kw') { price = PRICES.power1to3; label = '1~3kW 미만'; }
            if (formData.extraPower === '3-5kw') { price = PRICES.power3to5; label = '3~5kW 미만'; }
            if (formData.extraPower === '5kw+') { price = PRICES.power5plus; label = '5kW 이상'; }
            items.push({ name: `추가 전력 (${label})`, qty: 1, price, type: 'power' });
            }
            return items;
        };

        const getBoothSummary = () => {
            const items = [];
            if (formData.exhibitionBooth.active && formData.exhibitionBooth.qty > 0) {
            items.push(`전시부스 ${formData.exhibitionBooth.qty}개`);
            }
            if (formData.salesBooth.active && formData.salesBooth.qty > 0) {
            items.push(`판매부스 ${formData.salesBooth.qty}개`);
            }
            return items.join(' / ');
        };

        const breakdownItems = getBreakdownItems();

        return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-800 relative">
            {/* Header */}
            <header className="bg-gradient-to-r from-slate-900 to-slate-800 text-white py-8 px-4 shadow-xl border-b-4 border-orange-500 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-64 h-64 bg-orange-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
                <div className="absolute -bottom-32 -left-32 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>

                <div className="max-w-4xl mx-auto text-center relative z-10">
                <div className="flex justify-center items-center gap-2 mb-3">
                    <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-orange-500/20 text-orange-300 border border-orange-500/30 backdrop-blur-sm">
                    <Sun className="w-3 h-3 mr-1" /> Day & Night <Moon className="w-3 h-3 ml-1" />
                    </span>
                    <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-white/10 text-slate-200 border border-white/10 backdrop-blur-sm">
                    2026.04.17(금) ~ 19(일)
                    </span>
                </div>
                <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight mb-2 text-white">
                    2026 GOCF 참가 신청서
                </h1>
                <p className="text-slate-300 text-sm font-medium">Global Outdoor Camping Fair 2026 | 가평 자라섬 중도</p>
                </div>
            </header>

            <main className="max-w-4xl mx-auto py-8 px-4 pb-64">
                {/* Step Indicator */}
                <div className="flex items-center justify-center mb-10 space-x-4 text-sm">
                <div className={`flex items-center ${step >= 1 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}>
                    <span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 1 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>1</span>
                    참가 규정
                </div>
                <div className={`w-12 h-0.5 ${step >= 2 ? 'bg-orange-600' : 'bg-gray-300'}`}></div>
                <div className={`flex items-center ${step >= 2 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}>
                    <span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 2 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>2</span>
                    신청서 작성
                </div>
                <div className={`w-12 h-0.5 ${step >= 3 ? 'bg-orange-600' : 'bg-gray-300'}`}></div>
                <div className={`flex items-center ${step >= 3 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}>
                    <span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 3 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>3</span>
                    신청 완료
                </div>
                </div>

                {/* STEP 1: Terms */}
                {step === 1 && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in">
                    <div className="p-5 border-b border-gray-100 bg-gray-50 flex items-center">
                    <AlertCircle className="w-5 h-5 text-orange-600 mr-2" />
                    <h2 className="text-lg font-bold text-gray-900">참가 규정 및 약관 동의</h2>
                    </div>
                    <div className="p-6">
                    <div 
                        ref={termsRef}
                        className="h-96 overflow-y-auto bg-gray-50 p-4 rounded-lg text-sm leading-relaxed text-gray-600 border border-gray-200 mb-6 whitespace-pre-line shadow-inner"
                    >
                        {REGULATION_TEXT}
                    </div>
                    
                    <div 
                        className={`flex items-center justify-center p-4 rounded-lg border cursor-pointer transition-all duration-200 ${agreed ? 'bg-orange-50 border-orange-200 shadow-sm' : 'bg-white border-gray-200 hover:bg-gray-50'}`} 
                        onClick={() => setAgreed(!agreed)}
                    >
                        <div className={`w-6 h-6 rounded border flex items-center justify-center mr-3 transition-colors ${agreed ? 'bg-orange-600 border-orange-600' : 'bg-white border-gray-300'}`}>
                        {agreed && <Check className="w-4 h-4 text-white" />}
                        </div>
                        <span className={`font-bold select-none ${agreed ? 'text-orange-900' : 'text-gray-600'}`}>위 참가 규정을 모두 확인하였으며, 이에 동의합니다.</span>
                    </div>

                    <div className="mt-8 text-center">
                        <button 
                        onClick={() => { if(agreed) { setStep(2); window.scrollTo({ top: 0, behavior: 'smooth' }); } }}
                        disabled={!agreed}
                        className={`w-full md:w-auto px-10 py-3 rounded-lg font-bold text-lg transition-all transform active:scale-95 ${agreed ? 'bg-slate-900 text-white hover:bg-slate-800 shadow-lg hover:shadow-xl' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                        >
                        다음 단계로 이동
                        </button>
                    </div>
                    </div>
                </div>
                )}

                {/* STEP 2: Form */}
                {step === 2 && (
                <div className="space-y-8 animate-fade-in">
                    {/* Section 1: Basic Info */}
                    <section className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center">
                        <Store className="w-5 h-5 mr-2 text-orange-600" />
                        <h3 className="text-lg font-bold text-slate-900">참가 기업 정보</h3>
                    </div>
                    
                    <div className="p-6 space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">브랜드 명칭 <span className="text-red-500">*</span></label>
                            <input 
                            type="text" 
                            value={formData.brandName}
                            onChange={(e) => handleInputChange('root', 'brandName', e.target.value)}
                            placeholder="GOCF에 노출될 브랜드명을 입력하세요"
                            className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">사업자명 (계산서 발행용) <span className="text-red-500">*</span></label>
                            <input 
                            type="text" 
                            value={formData.bizName}
                            onChange={(e) => handleInputChange('root', 'bizName', e.target.value)}
                            placeholder="사업자등록증상의 상호를 입력하세요"
                            className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">사업자등록번호 <span className="text-red-500">*</span></label>
                            <input 
                            type="text" 
                            value={formData.bizNumber}
                            onChange={(e) => handleInputChange('root', 'bizNumber', e.target.value)}
                            placeholder="000-00-00000"
                            className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">사업자등록증 사본 <span className="text-red-500">*</span></label>
                            <div className="flex items-center space-x-2">
                            <label className="cursor-pointer bg-white hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-lg border border-gray-300 flex items-center transition-all shadow-sm w-full">
                                <Upload className="w-4 h-4 mr-2 text-gray-500" />
                                <span className="truncate">{formData.bizFile ? formData.bizFile.name : '파일 선택 (이미지/PDF)'}</span>
                                <input type="file" className="hidden" onChange={(e) => handleInputChange('root', 'bizFile', e.target.files[0])} />
                            </label>
                            </div>
                        </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center">
                            <Package className="w-4 h-4 mr-1 text-gray-400" /> 전시 품목
                            </label>
                            <textarea 
                            rows={2}
                            value={formData.exhibitionItems}
                            onChange={(e) => handleInputChange('root', 'exhibitionItems', e.target.value)}
                            placeholder="주요 전시 품목을 기재해주세요"
                            className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white resize-none"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center">
                            <ShoppingBag className="w-4 h-4 mr-1 text-gray-400" /> 판매 품목
                            </label>
                            <textarea 
                            rows={2}
                            value={formData.salesItems}
                            onChange={(e) => handleInputChange('root', 'salesItems', e.target.value)}
                            placeholder="현장 판매 예정인 품목을 기재해주세요"
                            className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white resize-none"
                            />
                        </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                        {/* Exhibition Manager */}
                        <div className="bg-slate-50 p-5 rounded-lg border border-slate-100">
                            <h4 className="font-bold text-slate-800 mb-4 text-sm uppercase tracking-wide flex items-center">
                            <span className="w-1.5 h-1.5 bg-slate-400 rounded-full mr-2"></span>전시 담당자
                            </h4>
                            <div className="space-y-3">
                            <input 
                                type="text" placeholder="담당자 성명"
                                className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm"
                                value={formData.exhibitionManager.name}
                                onChange={(e) => handleInputChange('exhibitionManager', 'name', e.target.value)}
                            />
                            <div className="grid grid-cols-2 gap-2">
                                <input 
                                type="text" placeholder="직함"
                                className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm"
                                value={formData.exhibitionManager.title}
                                onChange={(e) => handleInputChange('exhibitionManager', 'title', e.target.value)}
                                />
                                <input 
                                type="text" placeholder="연락처"
                                className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm"
                                value={formData.exhibitionManager.phone}
                                onChange={(e) => handleInputChange('exhibitionManager', 'phone', e.target.value)}
                                />
                            </div>
                            <input 
                                type="email" placeholder="이메일"
                                className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm"
                                value={formData.exhibitionManager.email}
                                onChange={(e) => handleInputChange('exhibitionManager', 'email', e.target.value)}
                            />
                            </div>
                        </div>

                        {/* Tax Manager */}
                        <div className="bg-slate-50 p-5 rounded-lg border border-slate-100">
                            <div className="flex justify-between items-center mb-4">
                            <h4 className="font-bold text-slate-800 text-sm uppercase tracking-wide flex items-center">
                                <span className="w-1.5 h-1.5 bg-slate-400 rounded-full mr-2"></span>세금계산서 담당자
                            </h4>
                            <label className="flex items-center cursor-pointer">
                                <input 
                                type="checkbox" 
                                className="w-4 h-4 text-orange-600 rounded border-gray-300 focus:ring-orange-500"
                                checked={isSameManager}
                                onChange={(e) => setIsSameManager(e.target.checked)}
                                />
                                <span className="ml-2 text-xs font-bold text-slate-600 flex items-center">
                                <UserCheck className="w-3 h-3 mr-1" />
                                전시 담당자와 동일
                                </span>
                            </label>
                            </div>
                            <div className="space-y-3">
                            <input 
                                type="text" placeholder="담당자 성명"
                                className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`}
                                value={formData.taxManager.name}
                                onChange={(e) => handleInputChange('taxManager', 'name', e.target.value)}
                                readOnly={isSameManager}
                            />
                            <div className="grid grid-cols-2 gap-2">
                                <input 
                                type="text" placeholder="직함"
                                className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`}
                                value={formData.taxManager.title}
                                onChange={(e) => handleInputChange('taxManager', 'title', e.target.value)}
                                readOnly={isSameManager}
                                />
                                <input 
                                type="text" placeholder="연락처"
                                className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`}
                                value={formData.taxManager.phone}
                                onChange={(e) => handleInputChange('taxManager', 'phone', e.target.value)}
                                readOnly={isSameManager}
                                />
                            </div>
                            <input 
                                type="email" placeholder="이메일"
                                className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`}
                                value={formData.taxManager.email}
                                onChange={(e) => handleInputChange('taxManager', 'email', e.target.value)}
                                readOnly={isSameManager}
                            />
                            </div>
                        </div>
                        </div>
                    </div>

                        <ul className="space-y-4 mb-6">
                        {breakdownItems.length === 0 ? (
                            <li className="text-gray-400 text-center py-4 text-sm">선택된 항목이 없습니다.</li>
                            ) : (
                            breakdownItems.map((item, idx) => {
                                const supplyPrice = item.price * item.qty;
                                const vatPrice = supplyPrice * 0.1;
                                // Color coding for specific types
                                const nameColor = item.type === 'exhibition' ? 'text-emerald-800' 
                                                : item.type === 'sales' ? 'text-amber-800'
                                                : 'text-gray-800';

                                return (
                                <li key={idx} className="border-b border-gray-100 pb-4 last:border-0 last:pb-0">
                                    <div className={`font-bold ${nameColor} mb-1 flex items-center`}>
                                    {item.name} <span className="text-xs text-gray-500 font-normal ml-2 bg-gray-100 px-1.5 py-0.5 rounded">x {item.qty}</span>
                                    </div>
                                    <div className="text-right">
                                    <div className="text-sm font-bold text-gray-800">{formatCurrency(supplyPrice)}원</div>
                                    <div className="text-xs text-gray-500 mt-0.5">{formatCurrency(vatPrice)}원 (부가세 10%)</div>
                                    </div>
                                </li>
                                );
                            })
                            )}
                        </ul>
                        
                        <div className="bg-slate-50 rounded-lg p-6 border border-slate-100 text-right">
                        <div className="flex justify-end items-end gap-3">
                            <span className="text-lg font-bold text-slate-600 mb-1">총 결제 금액 :</span>
                            <span className="text-3xl font-extrabold text-orange-600">{formatCurrency(costs.total)} 원</span>
                        </div>
                        <div className="text-xs text-gray-400 mt-2">* 부가세 포함 금액입니다.</div>
                        </div>
                    </div>
                    </section>

                    {/* Simplified Bottom Floating Bar (Right Aligned Only) */}
                    <div className={`fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-5px_20px_-5px_rgba(0,0,0,0.1)] z-50`}>
                    <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-end gap-6">
                        <div className="flex items-center gap-2">
                        <span className="text-sm font-bold text-gray-600">총 결제 금액 :</span>
                        <span className="text-2xl font-extrabold text-orange-600">{formatCurrency(costs.total)} <span className="text-sm font-bold text-gray-500">원</span></span>
                        </div>

                        <button 
                        onClick={handleSubmit}
                        disabled={isSubmitting}
                        className={`${isSubmitting ? 'bg-gray-400 cursor-not-allowed' : 'bg-orange-600 hover:bg-orange-700'} text-white font-bold py-3 px-8 rounded-lg transition-all shadow-md text-base whitespace-nowrap flex items-center justify-center min-w-[160px]`}
                        >
                        {isSubmitting ? (
                            <>
                            <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></div>
                            처리 중...
                            </>
                        ) : (
                            <>
                            참가 신청하기 <ChevronRight className="w-4 h-4 ml-1" />
                            </>
                        )}
                        </button>
                    </div>
                    </div>
                </div>
                )}

                {/* STEP 3: Complete */}
                {step === 3 && (
                <div className="bg-white rounded-xl shadow-lg border border-gray-200 p-10 text-center animate-fade-in py-20">
                    <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <Check className="w-12 h-12 text-green-500" />
                    </div>
                    <h2 className="text-3xl font-extrabold text-slate-900 mb-4">참가 신청이 완료되었습니다!</h2>
                    <p className="text-gray-600 mb-10 max-w-lg mx-auto leading-relaxed text-lg">
                    2026 GOCF와 함께해 주셔서 진심으로 감사드립니다.<br/>
                    담당자가 내용 확인 후 <span className="font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded">연락드릴 예정</span> 입니다.
                    </p>
                    
                    {/* Summary Section */}
                    <div className="bg-slate-50 p-6 rounded-xl max-w-md mx-auto mb-6 border border-slate-200 text-left shadow-sm">
                    <h4 className="font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2 flex justify-between items-center">
                        <span>신청 요약</span>
                        <span className="text-sm text-orange-600 font-bold">{getBoothSummary()}</span>
                    </h4>
                    <div className="space-y-3">
                        <div className="flex justify-between">
                        <span className="text-gray-500 text-sm">브랜드명</span>
                        <span className="font-bold text-gray-800">{formData.brandName}</span>
                        </div>
                        <div className="flex justify-between">
                        <span className="text-gray-500 text-sm">입금자명</span>
                        <span className="font-bold text-gray-800">{formData.depositorName}</span>
                        </div>
                        <div className="flex justify-between pt-2 border-t border-slate-200 mt-2">
                        <span className="text-gray-500 font-medium">총 결제 금액</span>
                        <span className="font-extrabold text-xl text-orange-600">{formatCurrency(costs.total)} 원</span>
                        </div>
                    </div>
                    </div>

                    {/* Deposit Info Section */}
                    <div className="bg-slate-50 p-6 rounded-xl max-w-md mx-auto mb-10 border border-slate-200 text-left shadow-sm">
                        <h4 className="font-bold text-slate-800 mb-3 text-sm flex items-center">
                            <span className="w-1.5 h-1.5 bg-slate-500 rounded-full mr-2"></span>
                            입금 계좌 정보 (참가비 입금)
                        </h4>
                        <div className="space-y-3 text-sm">
                            <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                <span className="text-gray-500">은행명</span>
                                <span className="font-bold text-slate-800">기업은행</span>
                            </div>
                            <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                <span className="text-gray-500">예금주</span>
                                <span className="font-bold text-slate-800">(주)하비비커뮤니케이션</span>
                            </div>
                            <div className="flex justify-between items-center pt-1">
                                <span className="text-gray-500">계좌번호</span>
                                <div className="flex items-center">
                                    <span className="font-bold text-slate-800 mr-2">585-039456-04-018</span>
                                    <button 
                                        onClick={handleCopyAccount}
                                        className={`flex items-center px-2 py-1 rounded text-xs font-bold transition-all ${isCopied ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                                    >
                                        {isCopied ? <Check className="w-3 h-3 mr-1" /> : <Copy className="w-3 h-3 mr-1" />}
                                        {isCopied ? '복사됨' : '복사'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 justify-center">
                    <button 
                        onClick={() => window.location.reload()}
                        className="px-8 py-3.5 bg-slate-900 hover:bg-slate-800 text-white rounded-lg font-bold transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1"
                    >
                        홈으로 돌아가기
                    </button>
                    <button 
                        onClick={handleSendMail}
                        disabled={isEmailSending}
                        className="px-8 py-3.5 bg-white border-2 border-slate-200 hover:border-orange-500 hover:text-orange-600 text-slate-600 rounded-lg font-bold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-1 flex items-center justify-center"
                    >
                        {isEmailSending ? (
                        <>
                            <div className="w-4 h-4 border-2 border-orange-500 border-t-transparent rounded-full animate-spin mr-2"></div>
                            발송 중...
                        </>
                        ) : (
                        <>
                            <Mail className="w-4 h-4 mr-2" />
                            신청 내역 메일로 받기
                        </>
                        )}
                    </button>
                    </div>
                </div>
                )}
            </main>

            {step !== 3 && (
                <footer className="bg-white border-t border-gray-200 py-10 pb-32 text-center text-gray-400 text-sm">
                <p className="font-medium text-gray-500">Global Outdoor Camping Fair 2026</p>
                <p className="mt-2">주식회사 하비비커뮤니케이션 | 사업자등록번호: 752-88-01786 | 문의: sales@habbcom.com</p>
                <p className="mt-1">이원일 부장 : 010-9101-0849 | 전형민 과장 : 010-7140-7798</p>
                <div className="mt-4 flex justify-center items-center gap-2">
                    <span className="text-xs text-gray-300">Copyright © 2026 GOCF. All Rights Reserved.</span>
                    <span className="text-gray-300">|</span>
                    <button 
                    onClick={onAdminClick}
                    className="text-xs text-gray-400 hover:text-orange-500 font-medium transition-colors"
                    >
                    관리자 로그인
                    </button>
                </div>
                </footer>
            )}
            </div>
        );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
