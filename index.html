2026 글로벌 아웃도어 캠핑 페어(GOCF) 참가 규정 및 계약 조건

제1조 (용어의 정의)
1. 전시참가자라 함은 본 전시회 참가를 위하여 참가신청서를 제출 및 참가비를 납부한 회사, 조합 및 단체를 말한다.

제2조 (참가신청 및 계약)
1. 전시참가자가 참가신청서를 제출하고, 제출 후 7일 이내에 참가비의 100%를 납부함으로써 본 계약은 성립한 것으로 본다. 단, 기한 내 미납 시 신청은 무효로 처리될 수 있다.
2. 주최자는 신청 내역 확인 후 참가비 내역을 전시참가자에게 이메일로 전달합니다.
3. 주최자는 전시참가자의 입금 내 확인 후 최종 참가 확정 내용을 전시참가자가 기재한 이메일로 전달합니다.

제3조 (전시부스 배정)
1. 주최자는 부스 배정에 대한 일체의 권한을 가지며, 참가규모와 전시품목 성격에 따라 배정한다. 전시참가자는 부스 배정의 문제로 참가비 반환 요구를 할 수 없다.
2. 주최자는 전시장의 공간 조화와 효율, 전시 효과 등을 위하여 전반적인 운영상 필요하다고 판단될 경우 배정된 전시 위치를 변경할 수 있으며, 전시참가자는 이에 대한 보상을 청구할 수 없다.

제4조 (전시공간 사용 및 관리)
1. 전시참가자는 참가신청서에 명시한 전시품과 상이하거나 전시회 성격에 부합하지 않는 물품, 혹은 지적재산권을 침해하는 물품을 전시할 수 없다. 주최자는 발견 즉시 중지, 철거를 명할 수 있으며 이 경우 참가비는 반환되지 않는다.
2. 전시참가자는 주최자의 서면 동의 없이 배정된 면적의 전부 또는 일부를 타인에게 양도하거나 전대할 수 없다.
3. 전시참가자는 타 참가자나 방문객에게 피해를 주지 않는 범위 내에서 부스를 운영해야 하며, 소음/악취 등 피해 발생 시 주최자는 운영 중지를 명할 수 있다.

제5조 (위약 및 해약)
1. 전시참가자가 배정된 부스 사용을 특별한 사유 없이 거부하거나 계약 내용을 위반할 경우 주최자는 계약을 해지할 수 있으며, 납입된 참가비는 반환하지 않는다.
2. 전시참가자가 계약을 취소하거나 규모를 축소할 경우 반드시 주최자에게 서면으로 통보해야 하며, 환불은 아래의 기준에 따라 행사 종료 후 1주일 이내에 처리한다.

[환불 규정]
- 행사 개최일 기준 80일 전 취소: 참가비 전액(100%) 환불
- 행사 개최일 기준 50일 전 취소: 참가비의 50% 환불
- 행사 개최일 기준 50일 이내 취소: 환불 불가

제6조 (전시회의 취소 및 변경)
1. 주최자의 귀책 사유로 전시회 개최가 취소되는 경우 주최자는 납입된 참가비 전액을 반환한다.
2. 천재지변, 감염병, 기타 불가항력적인 사정이나 주최자의 귀책 사유가 아닌 특별한 사정으로 전시회가 취소, 변경 또는 단축되는 경우 주최자는 참가비를 반환하지 않으며, 전시참가자는 이에 대한 보상을 청구할 수 없다.

제7조 (설치 및 전시품 진열)
1. 설치 및 진열 기간은 행사 시작일 하루 전 09:00부터 당일 행사 시작 전까지로 한다.
2. 전시참가자는 배정된 면적을 준수하여 시공해야 하며, 바닥 등 전시장 시설물을 손상했을 경우 원상복구 비용을 전액 부담해야 한다.

제8조 (반출 및 철수 규정)
1. 모든 전시품 및 시설물 반출은 행사 종료일 16:00부터 당일 자정까지 완료하여야 한다.
2. 전시참가자는 공식 행사 종료 시간인 종료일 16:00 이전에는 어떠한 경우에도 전시품의 철거 및 부스 해체 작업을 시작할 수 없다.
3. 전시참가자가 16:00 이전에 무단으로 조기 철수를 진행함으로써 발생하는 소비자 민원, 행사 운영 차질 및 주최자의 유·무형적 손해에 대하여, 주최자는 해당 전시참가자에게 손해배상을 청구 및 차기년도 참가 제한을 할 수 있다.
4. 전시참가자는 발생한 산업폐기물 및 쓰레기를 규정에 따라 직접 수거 및 처리해야 한다. 무단 방치 시 주최자가 대집행하고 그 비용을 전시참가자에게 청구한다.
5. 반출 지연으로 인한 전시품의 도난, 파손 등에 대한 책임은 전시참가자에게 있다.

제9조 (위험부담, 안전 및 보험)
1. 주최자는 전시장 경비를 지원하나, 전시참가자는 상주 인원을 통해 부스 내 시설 및 전시품의 도난·파손을 방지할 의무가 있다.
2. 야외 행사의 특성상 강풍, 우천 등 기상 상황에 대비하여 시설물을 견고히 고정해야 하며, 기상 악화로 인한 전시품 훼손 및 사고의 책임은 전시참가자에게 있다.
3. 전시참가자의 고의 또는 과실로 인한 화재, 도난, 파손, 상해 사고 발생 시 전시참가자가 전적인 배상 책임을 지며, 부스 운영에 관한 보험 가입 역시 전시참가자의 책임으로 한다.

제10조 (방화 및 안전 규정)
1. 전시장 내 모든 자재는 소방법규에 따른 불연처리가 되어야 하며, 주최자는 화재 방지를 위한 시정 요구를 할 수 있다.
2. 음향 기기 소음은 주변에 피해를 주지 않아야 하며, 주최자의 소음 중단 명령 시 즉각 따라야 한다.

제11조 (개인정보 및 홍보 활용)

            let supply = 0;
            if (data.exhibitionBooth?.active) {
                const price = data.exhibitionBooth.isPastParticipant ? PRICES.exhibitionDiscount : PRICES.exhibition;
                supply += price * Math.max(0, parseInt(data.exhibitionBooth.qty) || 0);

            if (data.salesBooth?.active) {
                supply += PRICES.sales * Math.max(0, parseInt(data.salesBooth.qty) || 0);
            }
            if (data.warehouseTent?.active) {
                supply += PRICES.warehouse * Math.max(0, parseInt(data.warehouseTent.qty) || 0);

            if (data.envFee) {
                supply += PRICES.envFee;
            }
            supply += PRICES.table * Math.max(0, parseInt(data.table?.qty) || 0);
            supply += PRICES.chair * Math.max(0, parseInt(data.chair?.qty) || 0);
            if (data.extraPower === '1-3kw') supply += PRICES.power1to3;
            if (data.extraPower === '3-5kw') supply += PRICES.power3to5;
            if (data.extraPower === '5kw+') supply += PRICES.power5plus;

            const vat = supply * 0.1;
            const total = supply + vat;
            
            return { supply, vat, total };

                    const expected = apps.filter(app => app.status !== 'confirmed').reduce((sum, app) => sum + (app.costs?.total || 0), 0);
                    const exhibitionCount = apps.reduce((sum, app) => sum + (app.exhibitionBooth?.active ? (parseInt(app.exhibitionBooth.qty) || 0) : 0), 0);
                    const salesCount = apps.reduce((sum, app) => sum + (app.salesBooth?.active ? (parseInt(app.salesBooth.qty) || 0) : 0), 0);

                    setStats({ total: apps.length, confirmedAmount: confirmed, expectedAmount: expected, exhibitionCount, salesCount });
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [isAuthenticated]);

            const handleLogin = () => {
                if (password === 'Net0521!@#$') {
                    setIsAuthenticated(true);
                } else {
                    showAlert('로그인 실패', '비밀번호가 일치하지 않습니다.');
                }
            };

            const handleDownloadCSV = () => {
                const headers = ['상태', '작성일시', '브랜드명', '사업자명', '사업자번호', '전시담당자', '연락처', '이메일', '부스신청내역', '계산서요청', '계산서발행', '총결제금액', '입금자명'];
                const csvContent = [
                    headers.join(','),
                    ...applications.map(app => {
                        const date = app.createdAt ? new Date(app.createdAt.seconds * 1000).toLocaleDateString() : '-';
                        const boothSummary = [];
                        if (app.exhibitionBooth?.active) boothSummary.push(`전시부스(${app.exhibitionBooth.qty})`);
                        if (app.salesBooth?.active) boothSummary.push(`판매부스(${app.salesBooth.qty})`);
                        const status = app.status === 'confirmed' ? '참가확정' : '신청완료';
                        
                        const taxType = app.taxInvoiceType === 'pre' ? '선발행' : '후발행';
                        const taxIssued = app.isTaxInvoiceIssued ? '완료' : '미발행';

                        return [
                            status, date, `"${app.brandName || ''}"`, `"${app.bizName || ''}"`, `"${app.bizNumber || ''}"`, 
                            `"${app.exhibitionManager?.name || ''}"`, `"${app.exhibitionManager?.phone || ''}"`, `"${app.exhibitionManager?.email || ''}"`, 
                            `"${boothSummary.join(' / ')}"`, `"${taxType}"`, `"${taxIssued}"`, app.costs?.total || 0, `"${app.depositorName || ''}"`
                        ].join(',');
                    })
                ].join('\n');

                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `GOCF_신청자명단_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: async function(results) {
                        try {
                            let count = 0;
                            for (const row of results.data) {
                                if(!row['브랜드명']) continue;
                                
                                const boothStr = row['부스신청내역'] || '';
                                const exMatch = boothStr.match(/전시부스\((\d+)\)/);
                                const saMatch = boothStr.match(/판매부스\((\d+)\)/);

                                const appData = {
                                    status: row['상태'] === '참가확정' ? 'confirmed' : 'applied',
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                    brandName: row['브랜드명'] || '',
                                    bizName: row['사업자명'] || '',
                                    bizNumber: row['사업자번호'] || '',
                                    exhibitionManager: {
                                        name: row['전시담당자'] || '',
                                        phone: row['연락처'] || '',
                                        email: row['이메일'] || ''
                                    },
                                    costs: {
                                        total: parseInt((row['총결제금액'] || '0').toString().replace(/,/g, '')) || 0
                                    },
                                    depositorName: row['입금자명'] || '',
                                    exhibitionBooth: { active: !!exMatch, qty: exMatch ? parseInt(exMatch[1]) : 0, isPastParticipant: false },
                                    salesBooth: { active: !!saMatch, qty: saMatch ? parseInt(saMatch[1]) : 0 },
                                    warehouseTent: { active: false, qty: 0 },
                                    envFee: true,
                                    table: { qty: 0 },
                                    chair: { qty: 0 },
                                    extraPower: 'none',
                                    taxManager: { name: '', title: '', email: '', phone: '' },
                                    settlementAccount: { bank: '', account: '', holder: '' },
                                    taxInvoiceType: 'pre',
                                    isTaxInvoiceIssued: false,
                                    exhibitionItems: '',
                                    salesItems: ''
                                };

                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').add(appData);
                                count++;
                            }
                            showAlert('업로드 성공', `총 ${count}건의 데이터가 성공적으로 업로드 되었습니다.`);
                        } catch (err) {
                            console.error(err);
                            showAlert('업로드 오류', '데이터 업로드 중 문제가 발생했습니다.');
                        }
                        e.target.value = '';
                    }
                });
            };

            const handleUpdateApp = async (updatedData) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').doc(selectedApp.id).update(updatedData);
                    showAlert('성공', '수정되었습니다.');
                    setEditMode(false);
                    setSelectedApp(null);
                } catch (e) {
                    showAlert('오류', '데이터 업데이트 중 오류가 발생했습니다.');
                }
            };

            const handleConfirmApp = () => {
                showConfirm('참가 확정', '입금이 확인되어 참가 확정 처리하시겠습니까?', async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').doc(selectedApp.id).update({ status: 'confirmed' });
                        showAlert('성공', '참가 확정 처리되었습니다.');
                        setSelectedApp(null);
                    } catch (e) {
                        showAlert('오류', '처리 중 문제가 발생했습니다.');
                    }
                });
            };

            const handleDeleteApp = () => {
                showConfirm('삭제 경고', '정말로 이 신청 내역을 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.', async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').doc(selectedApp.id).delete();
                        showAlert('성공', '삭제되었습니다.');
                        setSelectedApp(null);
                    } catch (e) {
                        showAlert('오류', '삭제 중 문제가 발생했습니다.');
                    }
                });
            };

            const handleToggleTaxInvoice = async (id, isIssued) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').doc(id).update({ isTaxInvoiceIssued: isIssued });
                } catch(e) {
                    console.error(e);
                    showAlert('오류', '세금계산서 상태 변경 중 오류가 발생했습니다.');
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center">
                                    <Icons.Lock className="w-8 h-8 text-orange-500" />
                                </div>
                            </div>
                            <h2 className="text-xl font-bold text-center text-gray-800 mb-6">관리자 로그인</h2>
                            <input 
                                type="password"
                                placeholder="비밀번호 입력"
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 outline-none focus:border-orange-500 transition-colors"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                            />
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-slate-900 text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition-colors mb-3"
                            >
                                접속하기
                            </button>
                            <button 
                                onClick={onBack}
                                className="w-full text-gray-500 text-sm py-2 hover:text-gray-700"
                            >
                                ← 메인으로 돌아가기
                            </button>
                        </div>
                    </div>
                );
            }

            const filteredApps = applications.filter(app => 
                app.brandName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                app.exhibitionManager?.name?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800">
                    <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <button onClick={onBack} className="p-2 hover:bg-slate-800 rounded-full transition-colors"><Icons.ArrowLeft className="w-5 h-5" /></button>
                                <h1 className="text-xl font-bold flex items-center"><Icons.Database className="w-5 h-5 mr-2 text-orange-500" /> 2026 GOCF 관리자</h1>
                            </div>
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="relative flex-1 md:w-64">
                                    <Icons.Search className="absolute left-3 top-2.5 w-4 h-4 text-gray-400" />
                                    <input 
                                        type="text" 
                                        placeholder="브랜드명 또는 담당자 검색" 
                                        className="w-full pl-9 pr-4 py-2 rounded-lg bg-slate-800 border-none text-sm text-white placeholder-slate-400 focus:ring-2 focus:ring-orange-500 outline-none"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <input 
                                        type="file" 
                                        accept=".csv" 
                                        ref={fileInputRef} 
                                        className="hidden" 
                                        onChange={handleFileUpload} 
                                    />
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center transition-colors whitespace-nowrap"
                                        title="엑셀을 CSV 형식으로 저장 후 업로드하세요"
                                    >
                                        <Icons.Upload className="w-4 h-4 mr-1.5" /> CSV 업로드
                                    </button>
                                    <button 
                                        onClick={handleDownloadCSV}
                                        className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center transition-colors whitespace-nowrap"
                                    >
                                        <Icons.Download className="w-4 h-4 mr-1.5" /> 엑셀 저장
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                         <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="text-xs font-bold text-gray-500 mb-1 uppercase">총 신청 건수</h3>
                                <div className="text-2xl font-extrabold text-slate-800">{stats.total} <span className="text-sm font-normal text-gray-400">건</span></div>
                            </div>
                            <div className="bg-emerald-50 p-5 rounded-xl shadow-sm border border-emerald-100">
                                <h3 className="text-xs font-bold text-emerald-600 mb-1 uppercase">전시부스 신청총계</h3>
                                <div className="text-2xl font-extrabold text-emerald-700">{stats.exhibitionCount} <span className="text-sm font-normal text-emerald-500">개</span></div>
                            </div>
                            <div className="bg-amber-50 p-5 rounded-xl shadow-sm border border-amber-100">
                                <h3 className="text-xs font-bold text-amber-600 mb-1 uppercase">판매부스 신청총계</h3>
                                <div className="text-2xl font-extrabold text-amber-700">{stats.salesCount} <span className="text-sm font-normal text-amber-500">개</span></div>
                            </div>
                            <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500">
                                <h3 className="text-xs font-bold text-gray-500 mb-1 flex items-center">확정 매출 (입금완료)</h3>
                                <div className="text-xl font-extrabold text-green-600 truncate">{formatCurrency(stats.confirmedAmount)} <span className="text-xs font-normal text-gray-400">원</span></div>
                            </div>
                            <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-orange-500">
                                <h3 className="text-xs font-bold text-gray-500 mb-1 flex items-center">수주 예상 (미확정)</h3>
                                <div className="text-xl font-extrabold text-orange-600 truncate">{formatCurrency(stats.expectedAmount)} <span className="text-xs font-normal text-gray-400">원</span></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                <span className="font-bold text-gray-700">신청 목록</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-100 text-gray-600 uppercase text-xs">
                                        <tr>
                                            <th className="px-6 py-3 font-bold">상태</th>
                                            <th className="px-6 py-3 font-bold">신청일시</th>
                                            <th className="px-6 py-3 font-bold">브랜드 정보</th>
                                            <th className="px-6 py-3 font-bold">신청 부스</th>
                                            <th className="px-6 py-3 font-bold">계산서</th>
                                            <th className="px-6 py-3 font-bold text-right">결제금액</th>
                                            <th className="px-6 py-3 font-bold">담당자</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {loading ? (
                                            <tr><td colSpan="7" className="p-8 text-center text-gray-500">로딩 중...</td></tr>
                                        ) : filteredApps.length === 0 ? (
                                            <tr><td colSpan="7" className="p-8 text-center text-gray-500">검색 결과 없음</td></tr>
                                        ) : (
                                            filteredApps.map((app) => (
                                                <tr key={app.id} className="hover:bg-orange-50/50 transition-colors cursor-pointer group" onClick={() => setSelectedApp(app)}>
                                                    <td className="px-6 py-4">
                                                        {app.status === 'confirmed' ? (
                                                            <span className="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded-full font-medium">참가확정</span>
                                                        ) : (
                                                            <span className="bg-gray-100 text-gray-800 text-xs px-2 py-0.5 rounded-full font-medium group-hover:bg-white">신청완료</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-xs text-gray-500 whitespace-nowrap">
                                                        {app.createdAt ? new Date(app.createdAt.seconds * 1000).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-gray-900">{app.brandName}</div>
                                                        <div className="text-xs text-gray-500">{app.bizName}</div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {app.exhibitionBooth?.active && (
                                                            <div className="text-emerald-700 text-xs font-bold mb-1">
                                                                전시 {app.exhibitionBooth.qty}개
                                                            </div>
                                                        )}
                                                        {app.salesBooth?.active && (
                                                            <div className="text-amber-700 text-xs font-bold">
                                                                판매 {app.salesBooth.qty}개
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4" onClick={(e) => e.stopPropagation()}>
                                                        <div className="flex flex-col gap-1">
                                                            <span className="text-xs text-gray-500 font-medium">
                                                                {app.taxInvoiceType === 'pre' ? '[선발행-청구]' : '[후발행-영수]'}
                                                            </span>
                                                            <label className="flex items-center cursor-pointer mt-1">
                                                                <input 
                                                                    type="checkbox" 
                                                                    className="w-4 h-4 text-blue-600 rounded border-gray-300"
                                                                    checked={!!app.isTaxInvoiceIssued} 
                                                                    onChange={(e) => handleToggleTaxInvoice(app.id, e.target.checked)} 
                                                                />
                                                                <span className="ml-1.5 text-xs font-bold text-gray-700">발행확인</span>
                                                            </label>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-bold text-gray-800">
                                                        {formatCurrency(app.costs?.total || 0)}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="text-gray-900">{app.exhibitionManager?.name}</div>
                                                        <div className="text-xs text-gray-500">{app.exhibitionManager?.phone}</div>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Modal */}
                        {selectedApp && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto relative">
                                    <div className="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                                        <h3 className="text-lg font-bold text-slate-900 flex items-center">
                                            {editMode ? '정보 수정' : '신청 상세'}
                                            {selectedApp.status === 'confirmed' && <span className="ml-2 text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full">참가확정</span>}
                                        </h3>
                                        <button onClick={() => { setSelectedApp(null); setEditMode(false); }} className="p-1 hover:bg-gray-100 rounded-full">
                                            <Icons.X className="w-5 h-5 text-gray-500" />
                                        </button>
                                    </div>
                                    <div className="p-6 space-y-6">
                                        {editMode ? (
                                            <EditForm app={selectedApp} onSave={handleUpdateApp} onCancel={() => setEditMode(false)} />
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-xs text-gray-500">브랜드명</label><div className="font-bold text-lg">{selectedApp.brandName}</div></div>
                                                    <div><label className="text-xs text-gray-500">사업자명</label><div className="font-medium">{selectedApp.bizName}</div></div>
                                                    <div><label className="text-xs text-gray-500">입금자명</label><div className="font-medium">{selectedApp.depositorName}</div></div>
                                                    <div><label className="text-xs text-gray-500">사업자번호</label><div className="font-medium">{selectedApp.bizNumber}</div></div>
                                                </div>
                                                <div className="bg-gray-50 p-3 rounded border border-gray-200 flex items-center">
                                                    <Icons.FileText className="w-5 h-5 text-gray-500 mr-2" />
                                                    <div>
                                                        <div className="text-xs text-gray-500 font-bold">사업자등록증 파일명</div>
                                                        <div className="text-sm text-blue-600 truncate max-w-xs">{selectedApp.bizFile || '없음'}</div>
                                                    </div>
                                                </div>
                                                <div className="border-t pt-4">
                                                    <h4 className="font-bold text-sm mb-3">담당자 정보</h4>
                                                    <div className="grid grid-cols-2 gap-4 text-sm">
                                                        <div className="bg-gray-50 p-3 rounded">
                                                            <div className="font-bold text-gray-600 mb-1">전시 담당자</div>
                                                            <div>{selectedApp.exhibitionManager?.name} {selectedApp.exhibitionManager?.title}</div>
                                                            <div className="text-gray-500">{selectedApp.exhibitionManager?.phone}</div>
                                                        </div>
                                                        <div className="bg-gray-50 p-3 rounded">
                                                            <div className="font-bold text-gray-600 mb-1">세금계산서 담당자</div>
                                                            <div>{selectedApp.taxManager?.name} {selectedApp.taxManager?.title}</div>
                                                            <div className="text-gray-500">{selectedApp.taxManager?.phone}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="border-t pt-4">
                                                    <h4 className="font-bold text-sm mb-3">신청 내역 & 금액 상세</h4>
                                                    <div className="bg-slate-50 p-4 rounded-lg space-y-2 text-sm border border-slate-200">
                                                        {getBreakdownItems(selectedApp).map((item, idx) => (
                                                            <div key={idx} className="flex justify-between items-center py-1 border-b border-slate-100 last:border-0">
                                                                <span className="text-slate-700 font-medium">
                                                                    {item.name} {item.qty > 1 ? `(${item.qty}개)` : ''}
                                                                </span>
                                                                <span className="text-slate-900">{formatCurrency(item.price * item.qty)} 원</span>
                                                            </div>
                                                        ))}
                                                        
                                                        {/* 세금계산서 발행 정보 추가 부분 */}
                                                        <div className="flex justify-between items-center pt-2 mt-2 border-t border-slate-300 text-sm font-medium">
                                                            <span className="text-slate-600">세금계산서 요청</span>
                                                            <span>
                                                                {selectedApp.taxInvoiceType === 'pre' ? '선발행 (청구)' : '후발행 (영수)'}
                                                                {selectedApp.isTaxInvoiceIssued ? 
                                                                    <span className="text-blue-600 ml-2 text-xs border border-blue-200 bg-blue-50 px-1.5 py-0.5 rounded">발행완료</span> : 
                                                                    <span className="text-red-500 ml-2 text-xs border border-red-200 bg-red-50 px-1.5 py-0.5 rounded">미발행</span>
                                                                }
                                                            </span>
                                                        </div>

                                                        <div className="pt-2 mt-2 flex justify-between font-bold text-lg border-t border-slate-300">
                                                            <span>총 결제 금액 (VAT 포함)</span>
                                                            <span className="text-orange-600">{formatCurrency(selectedApp.costs?.total || 0)} 원</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="sticky bottom-0 bg-gray-50 px-6 py-4 border-t flex justify-between items-center">
                                        {!editMode && (
                                            <>
                                                <button onClick={handleDeleteApp} className="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-medium text-sm flex items-center transition-colors">
                                                    <Icons.Trash2 className="w-4 h-4 mr-1.5" /> 삭제하기
                                                </button>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditMode(true)} className="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-50 flex items-center transition-colors">
                                                        <Icons.Edit className="w-4 h-4 mr-1.5" /> 정보 수정
                                                    </button>
                                                    {selectedApp.status !== 'confirmed' && (
                                                        <button onClick={handleConfirmApp} className="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-800 flex items-center transition-colors shadow-lg">
                                                            <Icons.CheckCircle className="w-4 h-4 mr-1.5" /> 입금 확인 / 참가 확정
                                                        </button>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- Application Form Component ---
        const ApplicationForm = ({ onAdminClick, user, showAlert, showConfirm }) => {
            const [step, setStep] = useState(1);
            const [agreed, setAgreed] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [isSameManager, setIsSameManager] = useState(false);
            const [formData, setFormData] = useState({
                brandName: '', bizName: '', exhibitionManager: { name: '', title: '', email: '', phone: '' },
                taxManager: { name: '', title: '', email: '', phone: '' }, bizNumber: '', bizFile: null,
                exhibitionItems: '', salesItems: '', exhibitionBooth: { active: false, qty: 0, isPastParticipant: false },
                salesBooth: { active: false, qty: 0 }, warehouseTent: { active: false, qty: 0 }, envFee: true,
                table: { qty: 0 }, chair: { qty: 0 }, extraPower: 'none', depositorName: '',
                settlementAccount: { bank: '', account: '', holder: '' }, taxInvoiceType: 'pre'
            });
            const [costs, setCosts] = useState({ supply: 0, vat: 0, total: 0 });

            useEffect(() => {
                if (isSameManager) setFormData(prev => ({ ...prev, taxManager: { ...prev.exhibitionManager } }));
            }, [isSameManager, formData.exhibitionManager]);

            useEffect(() => { setCosts(calculateCosts(formData)); }, [formData]);

            const handleInputChange = (section, field, value) => {
                if (section === 'root') {
                    if (field === 'envFee' && value === false) return;
                    setFormData(prev => ({ ...prev, [field]: value }));
                } else if (['exhibitionManager', 'taxManager', 'settlementAccount'].includes(section)) {
                    setFormData(prev => ({ ...prev, [section]: { ...prev[section], [field]: value } }));
                } else if (['exhibitionBooth', 'salesBooth', 'warehouseTent'].includes(section)) {
                    setFormData(prev => ({ ...prev, [section]: { ...prev[section], [field]: value } }));
                } else if (['table', 'chair'].includes(section)) {
                    setFormData(prev => ({ ...prev, [section]: { ...prev[section], qty: parseInt(value) || 0 } }));
                }
            };

            const handleCopyAccount = () => {
                const account = "585-039456-04-018";
                navigator.clipboard.writeText(account).then(() => { setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); });
            };

            const handleSubmit = async () => {
                if (!formData.brandName || !formData.bizName || !formData.depositorName) {
                    showAlert('필수 정보 누락', "필수 정보(브랜드명, 사업자명, 입금자명)를 모두 입력해주세요.");
                    return;
                }
                setIsSubmitting(true);
                try {
                    if (!auth.currentUser) await auth.signInAnonymously();
                    const submissionData = { ...formData, bizFile: formData.bizFile ? formData.bizFile.name : null, costs, userId: auth.currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp(), status: 'applied', isTaxInvoiceIssued: false };
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gocf_applications').add(submissionData);
                    setStep(3);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) {
                    console.error(e);
                    showAlert('오류 발생', "신청 중 오류가 발생했습니다.\n(Firebase 익명 로그인 설정을 확인해주세요)");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const getBoothSummary = () => {
                const items = [];
                if (formData.exhibitionBooth.active && formData.exhibitionBooth.qty > 0) items.push(`전시부스 ${formData.exhibitionBooth.qty}개`);
                if (formData.salesBooth.active && formData.salesBooth.qty > 0) items.push(`판매부스 ${formData.salesBooth.qty}개`);
                return items.join(' / ');
            };
            
            const breakdownItems = getBreakdownItems(formData);

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 relative">
                    <header className="bg-gradient-to-r from-slate-900 to-slate-800 text-white py-8 px-4 shadow-xl border-b-4 border-orange-500 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-orange-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
                        <div className="absolute -bottom-32 -left-32 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            <div className="flex justify-center items-center gap-2 mb-3">
                                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-orange-500/20 text-orange-300 border border-orange-500/30 backdrop-blur-sm"><Icons.Sun className="w-3 h-3 mr-1" /> Day & Night <Icons.Moon className="w-3 h-3 ml-1" /></span>
                                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-white/10 text-slate-200 border border-white/10 backdrop-blur-sm">2026.04.17(금) ~ 19(일)</span>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight mb-2 text-white">2026 GOCF 참가 신청서</h1>
                            <p className="text-slate-300 text-sm font-medium">Global Outdoor Camping Fair 2026 | 가평 자라섬 중도</p>
                        </div>
                    </header>
                    <main className="max-w-4xl mx-auto py-8 px-4 pb-64">
                        {/* Step Indicator */}
                        <div className="flex items-center justify-center mb-10 space-x-4 text-sm">
                            <div className={`flex items-center ${step >= 1 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}><span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 1 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>1</span>참가 규정</div>
                            <div className={`w-12 h-0.5 ${step >= 2 ? 'bg-orange-600' : 'bg-gray-300'}`}></div>
                            <div className={`flex items-center ${step >= 2 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}><span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 2 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>2</span>신청서 작성</div>
                            <div className={`w-12 h-0.5 ${step >= 3 ? 'bg-orange-600' : 'bg-gray-300'}`}></div>
                            <div className={`flex items-center ${step >= 3 ? 'text-orange-600 font-bold' : 'text-gray-400'}`}><span className={`w-7 h-7 rounded-full flex items-center justify-center border-2 mr-2 ${step >= 3 ? 'bg-orange-600 text-white border-orange-600' : 'border-gray-300 bg-white'}`}>3</span>신청 완료</div>
                        </div>

                        {/* STEP 1 */}
                        {step === 1 && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in">
                                <div className="p-5 border-b border-gray-100 bg-gray-50 flex items-center"><Icons.AlertCircle className="w-5 h-5 text-orange-600 mr-2" /><h2 className="text-lg font-bold text-gray-900">참가 규정 및 약관 동의</h2></div>
                                <div className="p-6">
                                    <div className="h-96 overflow-y-auto bg-gray-50 p-4 rounded-lg text-sm leading-relaxed text-gray-600 border border-gray-200 mb-6 whitespace-pre-line shadow-inner">{REGULATION_TEXT}</div>
                                    <div className={`flex items-center justify-center p-4 rounded-lg border cursor-pointer transition-all duration-200 ${agreed ? 'bg-orange-50 border-orange-200 shadow-sm' : 'bg-white border-gray-200 hover:bg-gray-50'}`} onClick={() => setAgreed(!agreed)}>
                                        <div className={`w-6 h-6 rounded border flex items-center justify-center mr-3 transition-colors ${agreed ? 'bg-orange-600 border-orange-600' : 'bg-white border-gray-300'}`}>{agreed && <Icons.Check className="w-4 h-4 text-white" />}</div>
                                        <span className={`font-bold select-none ${agreed ? 'text-orange-900' : 'text-gray-600'}`}>위 참가 규정을 모두 확인하였으며, 이에 동의합니다.</span>
                                    </div>
                                    <div className="mt-8 text-center"><button onClick={() => { if(agreed) { setStep(2); window.scrollTo({ top: 0, behavior: 'smooth' }); } }} disabled={!agreed} className={`w-full md:w-auto px-10 py-3 rounded-lg font-bold text-lg transition-all transform active:scale-95 ${agreed ? 'bg-slate-900 text-white hover:bg-slate-800 shadow-lg hover:shadow-xl' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>다음 단계로 이동</button></div>
                                </div>
                            </div>
                        )}

                        {/* STEP 2 */}
                        {step === 2 && (
                             <div className="space-y-8 animate-fade-in">
                                <section className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center"><Icons.Store className="w-5 h-5 mr-2 text-orange-600" /><h3 className="text-lg font-bold text-slate-900">참가 기업 정보</h3></div>
                                    <div className="p-6 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div><label className="block text-sm font-bold text-gray-700 mb-1">브랜드 명칭 <span className="text-red-500">*</span></label><input type="text" value={formData.brandName} onChange={(e) => handleInputChange('root', 'brandName', e.target.value)} placeholder="GOCF에 노출될 브랜드명을 입력하세요" className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white" /></div>
                                            <div><label className="block text-sm font-bold text-gray-700 mb-1">사업자명 (계산서 발행용) <span className="text-red-500">*</span></label><input type="text" value={formData.bizName} onChange={(e) => handleInputChange('root', 'bizName', e.target.value)} placeholder="사업자등록증상의 상호를 입력하세요" className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white" /></div>
                                            <div><label className="block text-sm font-bold text-gray-700 mb-1">사업자등록번호 <span className="text-red-500">*</span></label><input type="text" value={formData.bizNumber} onChange={(e) => handleInputChange('root', 'bizNumber', e.target.value)} placeholder="000-00-00000" className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white" /></div>
                                            <div><label className="block text-sm font-bold text-gray-700 mb-1">사업자등록증 사본</label><div className="flex items-center space-x-2"><label className="cursor-pointer bg-white hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-lg border border-gray-300 flex items-center transition-all shadow-sm w-full"><Icons.Upload className="w-4 h-4 mr-2 text-gray-500" /><span className="truncate">{formData.bizFile ? formData.bizFile.name : '파일 선택 (이미지/PDF)'}</span><input type="file" className="hidden" onChange={(e) => handleInputChange('root', 'bizFile', e.target.files[0])} /></label></div></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center"><Icons.Package className="w-4 h-4 mr-1 text-gray-400" /> 전시 품목</label>
                                                <textarea rows={2} value={formData.exhibitionItems} onChange={(e) => handleInputChange('root', 'exhibitionItems', e.target.value)} placeholder="주요 전시 품목을 기재해주세요" className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white resize-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center"><Icons.ShoppingBag className="w-4 h-4 mr-1 text-gray-400" /> 판매 품목</label>
                                                <textarea rows={2} value={formData.salesItems} onChange={(e) => handleInputChange('root', 'salesItems', e.target.value)} placeholder="현장 판매 예정인 품목을 기재해주세요" className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-white resize-none" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                                            <div className="bg-slate-50 p-5 rounded-lg border border-slate-100">
                                                <h4 className="font-bold text-slate-800 mb-4 text-sm uppercase tracking-wide flex items-center"><span className="w-1.5 h-1.5 bg-slate-400 rounded-full mr-2"></span>전시 담당자</h4>
                                                <div className="space-y-3">
                                                    <input type="text" placeholder="담당자 성명" className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm" value={formData.exhibitionManager.name} onChange={(e) => handleInputChange('exhibitionManager', 'name', e.target.value)} />
                                                    <div className="grid grid-cols-2 gap-2"><input type="text" placeholder="직함" className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm" value={formData.exhibitionManager.title} onChange={(e) => handleInputChange('exhibitionManager', 'title', e.target.value)} /><input type="text" placeholder="연락처" className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm" value={formData.exhibitionManager.phone} onChange={(e) => handleInputChange('exhibitionManager', 'phone', e.target.value)} /></div>
                                                    <input type="email" placeholder="이메일" className="w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm" value={formData.exhibitionManager.email} onChange={(e) => handleInputChange('exhibitionManager', 'email', e.target.value)} />
                                                </div>
                                            </div>
                                             <div className="bg-slate-50 p-5 rounded-lg border border-slate-100">
                                                <div className="flex justify-between items-center mb-4"><h4 className="font-bold text-slate-800 text-sm uppercase tracking-wide flex items-center"><span className="w-1.5 h-1.5 bg-slate-400 rounded-full mr-2"></span>세금계산서 담당자</h4><label className="flex items-center cursor-pointer"><input type="checkbox" className="w-4 h-4 text-orange-600 rounded border-gray-300 focus:ring-orange-500" checked={isSameManager} onChange={(e) => setIsSameManager(e.target.checked)} /><span className="ml-2 text-xs font-bold text-slate-600 flex items-center"><Icons.UserCheck className="w-3 h-3 mr-1" />전시 담당자와 동일</span></label></div>
                                                <div className="space-y-3">
                                                    <input type="text" placeholder="담당자 성명" className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`} value={formData.taxManager.name} onChange={(e) => handleInputChange('taxManager', 'name', e.target.value)} readOnly={isSameManager} />
                                                    <div className="grid grid-cols-2 gap-2"><input type="text" placeholder="직함" className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`} value={formData.taxManager.title} onChange={(e) => handleInputChange('taxManager', 'title', e.target.value)} readOnly={isSameManager} /><input type="text" placeholder="연락처" className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`} value={formData.taxManager.phone} onChange={(e) => handleInputChange('taxManager', 'phone', e.target.value)} readOnly={isSameManager} /></div>
                                                    <input type="email" placeholder="이메일" className={`w-full px-3 py-2 border border-gray-300 rounded focus:border-orange-500 outline-none text-sm ${isSameManager ? 'bg-gray-100' : ''}`} value={formData.taxManager.email} onChange={(e) => handleInputChange('taxManager', 'email', e.target.value)} readOnly={isSameManager} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                                
                                <div className="bg-gradient-to-r from-slate-800 via-slate-900 to-slate-800 rounded-lg p-6 text-white text-center shadow-md border-l-4 border-orange-500 relative overflow-hidden mt-8 mb-8">
                                   <div className="relative z-10">
                                     <div className="flex justify-center items-center mb-2">
                                       <Icons.Sun className="w-5 h-5 text-orange-400 mr-2" />
                                       <h3 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-200 to-white">이번 행사는 <span className="text-orange-400">Day & Night</span> 컨셉입니다.</h3>
                                       <Icons.Moon className="w-5 h-5 text-blue-200 ml-2" />
                                     </div>
                                     <p className="text-slate-300 text-sm md:text-base leading-relaxed">운영 시간: <span className="font-bold text-white">11:00 ~ 20:00</span> <br className="md:hidden" /><span className="hidden md:inline mx-2">|</span>야간 분위기와 감성이 포함된 전시 구성을 부탁드립니다.</p>
                                   </div>
                                </div>

                                <section className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                  <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center"><Icons.LayoutGrid className="w-5 h-5 mr-2 text-orange-600" /><h3 className="text-lg font-bold text-slate-900">부스 신청</h3></div>
                                  <div className="p-6 space-y-6">
                                    <div className={`p-5 rounded-xl border-2 transition-all cursor-pointer ${formData.exhibitionBooth.active ? 'border-orange-500 bg-orange-50/20 ring-1 ring-orange-200' : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'}`}>
                                      <div className="flex items-start">
                                        <div className="pt-1 mr-4"><input type="checkbox" className="w-6 h-6 text-orange-600 rounded focus:ring-orange-500 cursor-pointer" checked={formData.exhibitionBooth.active} onChange={(e) => handleInputChange('exhibitionBooth', 'active', e.target.checked)} /></div>
                                        <div className="flex-1" onClick={() => !formData.exhibitionBooth.active && handleInputChange('exhibitionBooth', 'active', true)}>
                                          <div className="flex flex-col md:flex-row md:justify-between md:items-start mb-2"><label className="text-lg font-bold text-emerald-800 cursor-pointer">전시 부스 (잔디 구역)</label><span className="text-lg font-bold text-orange-600 mt-1 md:mt-0">₩2,000,000 <span className="text-xs text-gray-500 font-normal">(VAT별도)</span></span></div>
                                          <p className="text-sm text-gray-600 mb-4 bg-white/50 inline-block px-2 py-1 rounded border border-gray-100 leading-relaxed">
                                            <span className="font-semibold">규격:</span> 10m x 15m (대형 잔디) | <span className="font-semibold">기본제공:</span> 1kW 전력 (배전반 연결)
                                          </p>
                                          {formData.exhibitionBooth.active && <div className="bg-white p-4 rounded-lg border border-gray-200 mt-2 animate-fade-in shadow-sm" onClick={(e) => e.stopPropagation()}><div className="flex flex-col md:flex-row md:items-center justify-between gap-4"><div><label className="block text-xs font-bold text-gray-500 uppercase mb-1.5">신청 수량</label><div className="flex items-center"><button className="w-9 h-9 rounded-l border border-gray-300 bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600" onClick={() => handleInputChange('exhibitionBooth', 'qty', Math.max(0, formData.exhibitionBooth.qty - 1))}>-</button><input type="number" className="w-16 h-9 border-t border-b border-gray-300 text-center outline-none font-bold text-gray-800" value={formData.exhibitionBooth.qty} onChange={(e) => handleInputChange('exhibitionBooth', 'qty', parseInt(e.target.value) || 0)} /><button className="w-9 h-9 rounded-r border border-gray-300 bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600" onClick={() => handleInputChange('exhibitionBooth', 'qty', formData.exhibitionBooth.qty + 1)}>+</button></div></div><div className="flex items-center bg-green-50 px-4 py-3 rounded-lg border border-green-100"><input type="checkbox" id="pastPart" className="w-5 h-5 text-green-600 rounded mr-3 cursor-pointer" checked={formData.exhibitionBooth.isPastParticipant} onChange={(e) => handleInputChange('exhibitionBooth', 'isPastParticipant', e.target.checked)} /><label htmlFor="pastPart" className="text-sm font-bold text-green-800 cursor-pointer">이전 참가 이력 보유 <span className="text-xs ml-2 bg-white text-green-700 border border-green-200 px-2 py-0.5 rounded-full">-40만원 할인 (160만원/부스)</span></label></div></div></div>}
                                        </div>

                return () => unsubscribe();
            }, []);

            const showAlert = (title, message) => { setModalConfig({ isOpen: true, title, message, type: 'alert', onConfirm: () => setModalConfig(prev => ({ ...prev, isOpen: false })), onCancel: null }); };
            const showConfirm = (title, message, onConfirmAction) => { setModalConfig({ isOpen: true, title, message, type: 'confirm', onConfirm: () => { onConfirmAction(); setModalConfig(prev => ({ ...prev, isOpen: false })); }, onCancel: () => setModalConfig(prev => ({ ...prev, isOpen: false })) }); };

            if (!app) return <div className="min-h-screen flex items-center justify-center p-8 text-center"><div><h1 className="text-2xl font-bold text-red-600 mb-4">설정 오류</h1><p className="text-gray-600">Firebase 설정이 완료되지 않았습니다.</p><p className="text-sm text-gray-400 mt-2">index.html 파일을 열어 firebaseConfig 값을 입력해주세요.</p></div></div>;

            return (
                <React.Fragment>
                    <CustomModal {...modalConfig} />
                    {currentView === 'admin' 
                        ? <AdminDashboard onBack={() => setCurrentView('form')} showAlert={showAlert} showConfirm={showConfirm} />
                        : <ApplicationForm onAdminClick={() => setCurrentView('admin')} user={user} showAlert={showAlert} showConfirm={showConfirm} />
                    }
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
